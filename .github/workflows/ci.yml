name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ---------------------------------------------------------------------------
  # PHP tests, static analysis, and code-style checks
  # ---------------------------------------------------------------------------
  php:
    name: PHP ${{ matrix.php }} – Tests & Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, openssl, curl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit tests
        run: composer test

      - name: Run PHPStan static analysis
        run: composer analyse

      - name: Check code style (dry run)
        run: composer lint

  # ---------------------------------------------------------------------------
  # Node.js – Vite build
  # ---------------------------------------------------------------------------
  node:
    name: Node.js – Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high

      - name: Check Vite configuration
        run: node -e "import('./vite.config.js').then(() => console.log('Vite config OK')).catch(e => { console.error(e); process.exit(1); })"
