name: Deploy

# ---------------------------------------------------------------------------
# Deployment Workflow
# ---------------------------------------------------------------------------
# Triggered automatically on every push to the main branch AFTER the CI
# pipeline passes, or manually via the GitHub Actions UI.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       – SSH hostname or IP of the production server
#   DEPLOY_USER       – SSH user (e.g. "www-data" or "deploy")
#   DEPLOY_KEY        – Private SSH key (corresponding public key must be in
#                       ~/.ssh/authorized_keys on the server)
#   DEPLOY_PATH       – Absolute path on the server, e.g. /var/www/intranet
#
# Optional secrets:
#   DEPLOY_PORT       – SSH port (default: 22)
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []               # add "tests", "frontend" etc. here to gate on CI
    environment: production # protects secrets and enables manual approval gate
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || '22' }} \
            -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='logs/' \
            --exclude='backups/' \
            --exclude='uploads/' \
            --exclude='storage/twig_cache/' \
            --exclude='vendor/' \
            -e "ssh -p ${{ secrets.DEPLOY_PORT || '22' }}" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Run post-deploy tasks on server
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || '22' }} \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             vendor/bin/phinx migrate --environment production && \
             php -r 'opcache_reset();' 2>/dev/null || true"
