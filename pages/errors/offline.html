<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline – IBC Intranet</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ibc-blue:  #0066b3;
            --ibc-green: #00a651;
            --bg:        #f1f5f9;
            --card-bg:   #ffffff;
            --text:      #1e293b;
            --muted:     #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:      #0a0f1e;
                --card-bg: #1e293b;
                --text:    #f1f5f9;
                --muted:   #94a3b8;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ibc-blue), var(--ibc-green));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-wrap svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--ibc-blue);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem 1.75rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            min-height: 44px;
        }

        .btn:hover  { background: #004f8c; }
        .btn:active { transform: scale(0.97); }

        .status {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .status.online {
            color: var(--ibc-green);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.25rem; }
            .btn  { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap" aria-hidden="true">
            <!-- wifi-off icon -->
            <svg viewBox="0 0 24 24">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a16 16 0 0 1 4.57-2.73"/>
                <path d="M12 20h.01"/>
            </svg>
        </div>

        <h1>Du bist offline</h1>
        <p>
            Keine Internetverbindung gefunden. Überprüfe dein WLAN oder mobile Daten
            und versuche es erneut.
        </p>

        <button class="btn" onclick="retryConnection()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Erneut versuchen
        </button>

        <p class="status" id="status-msg" aria-live="polite"></p>
    </div>

    <script>
        function retryConnection() {
            window.location.reload();
        }

        function updateStatus() {
            const el = document.getElementById('status-msg');
            if (navigator.onLine) {
                el.textContent = '✓ Verbindung wiederhergestellt – lade neu…';
                el.className = 'status online';
                setTimeout(() => window.location.reload(), 800);
            } else {
                el.textContent = '';
                el.className = 'status';
            }
        }

        window.addEventListener('online', updateStatus);
    </script>
</body>
</html>
