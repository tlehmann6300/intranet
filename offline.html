<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0066b3">
    <title>Offline – IBC Intranet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0f1e;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; }
        p  { color: #94a3b8; max-width: 400px; line-height: 1.6; margin-bottom: 1rem; }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.65rem 1.75rem;
            background: #0066b3;
            color: #fff;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #0052a3; }
        .links {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        .link-card {
            padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0.75rem;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.2s;
        }
        .link-card:hover { background: rgba(255,255,255,0.12); }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Keine Internetverbindung</h1>
    <p>Du bist gerade offline. Einige Seiten wurden für den Offline-Zugriff gespeichert.</p>
    <p>Prüfe deine Netzwerkverbindung und versuche es erneut.</p>

    <a href="/" class="btn" onclick="window.location.reload()">Erneut versuchen</a>

    <div class="links">
        <a href="/inventory" class="link-card">📦 Inventarliste</a>
        <a href="/inventory/my-checkouts" class="link-card">📋 Meine Ausleihen</a>
        <a href="/dashboard" class="link-card">🏠 Dashboard</a>
    </div>

    <script>
        // Auto-retry when back online
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
